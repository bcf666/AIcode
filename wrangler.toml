name = "aicode"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "JOBS_KV"
id = "jobs-kv"
preview_id = "jobs-kv-preview"

[[r2_buckets]]
binding = "APK_BUCKET"
bucket_name = "apk-bucket"
preview_bucket_name = "apk-bucket-preview"
